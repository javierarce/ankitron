name: Deploy site

on:
  push:
    branches: [main]
    # Only redeploy when the site (or this workflow) actually changes.
    # package.json is included so a version bump restamps the version label.
    paths:
      - "docs/**"
      - "package.json"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

# Never let two deploys rsync the web root at the same time.
concurrency:
  group: deploy-site
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stamp the live app version into the page server-side, so the browser
      # never has to call the GitHub API (which adblockers block and which is
      # rate-limited per IP). Sourced from package.json, bumped on every release.
      - name: Stamp version into the page
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "Stamping version $VERSION into docs/index.html"
          sed -i "s|<span id=\"version\">[^<]*</span>|<span id=\"version\">${VERSION}</span>|" docs/index.html
          grep -o '<span id="version">[^<]*</span>' docs/index.html

      - name: Deploy over SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            --exclude='CNAME' \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            docs/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
