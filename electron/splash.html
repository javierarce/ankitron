<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Anki Deck Manager</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #171717;
        --accent: #6366f1;
        --muted: rgba(99, 102, 241, 0.2);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --fg: #ededed;
          --muted: rgba(99, 102, 241, 0.25);
        }
      }
      html,
      body {
        margin: 0;
        height: 100vh;
        width: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-app-region: drag;
        -webkit-user-select: none;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--muted);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .label {
        font-size: 13px;
        opacity: 0.55;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div class="spinner" aria-hidden="true"></div>
    <div class="label">Anki Deck Manager</div>
  </body>
</html>
