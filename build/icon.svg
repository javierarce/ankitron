<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-opacity="0.28" />
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="230" fill="url(#bg)" />

  <!-- Back card (peeking, rotated left) -->
  <g transform="translate(512 512) rotate(-9) translate(-250 -330)" opacity="0.45">
    <rect width="500" height="660" rx="40" fill="#ffffff" />
  </g>

  <!-- Front card -->
  <g transform="translate(512 512) rotate(5) translate(-250 -330)" filter="url(#shadow)">
    <rect width="500" height="660" rx="40" fill="#ffffff" />

    <!-- Heading bar -->
    <rect x="60" y="110" width="340" height="44" rx="10" fill="#312e81" />

    <!-- Body lines -->
    <rect x="60" y="210" width="260" height="22" rx="6" fill="#a5b4fc" />
    <rect x="60" y="256" width="320" height="22" rx="6" fill="#a5b4fc" />
    <rect x="60" y="302" width="220" height="22" rx="6" fill="#a5b4fc" />

    <!-- Divider -->
    <rect x="60" y="420" width="380" height="4" rx="2" fill="#e0e7ff" />

    <!-- Ease dots: Again / Hard / Good / Easy -->
    <circle cx="120" cy="520" r="26" fill="#ef4444" />
    <circle cx="210" cy="520" r="26" fill="#f59e0b" />
    <circle cx="300" cy="520" r="26" fill="#10b981" />
    <circle cx="390" cy="520" r="26" fill="#3b82f6" />
  </g>
</svg>
